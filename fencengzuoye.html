    <script>
        function applyTheme(theme) {
            const isDarkSystem = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (theme === 'dark' || (theme === 'system' && isDarkSystem)) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        }
        const savedTheme = localStorage.getItem('smartClinicTheme') || 'system';
        applyTheme(savedTheme);
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (localStorage.getItem('smartClinicTheme') === 'system') applyTheme('system');
        });
    </script>

    <script>
        // --- 核心状态与记忆库 ---
        let state = { 
            students: [], 
            knowledgePoints: [], 
            stagedImages: [],
            lastExtractedText: "", 
            lastExtractedImages: [] 
        };
        
        let autoSaveInterval = null;
        const DRAFT_KEY = 'smartClinicDraft';

        function loadHistory() { return JSON.parse(localStorage.getItem('smartClinicHistory') || '{}'); }
        function saveHistory(history) { localStorage.setItem('smartClinicHistory', JSON.stringify(history)); }
        function recordHistory(sid, kps) {
            let history = loadHistory();
            if (!history[sid]) history[sid] = {};
            kps.forEach(kp => { history[sid][kp] = (history[sid][kp] || 0) + 1; });
            saveHistory(history);
        }

        function getStage(grade) {
            if (['一年级', '二年级', '三年级', '四年级', '五年级', '六年级'].includes(grade)) return 'primary';
            if (['七年级', '八年级', '九年级'].includes(grade)) return 'middle';
            if (['高一', '高二', '高三'].includes(grade)) return 'high';
            return 'primary';
        }

        function getQuestionTypes(subject, grade) {
            const stage = getStage(grade);
            const map = {
                '语文': {
                    'primary': ['看拼音写词语', '选词填空', '句子训练', '课内阅读', '课外阅读'],
                    'middle': ['基础字词与运用', '综合性学习', '古诗文默写', '文言文阅读', '现代文阅读'],
                    'high': ['现代文阅读', '文言文阅读', '古代诗歌鉴赏', '名篇名句默写', '语言文字运用']
                },
                '数学': {
                    'primary': ['填空题', '判断题', '选择题', '计算题', '解决问题'],
                    'middle': ['选择题', '填空题', '计算题', '几何证明题', '综合应用题'],
                    'high': ['选择题', '多项选择题', '填空题', '解答题', '选做题']
                },
                '英语': {
                    'primary': ['单词拼写', '单项选择', '情景交际', '阅读理解', '连词成句'],
                    'middle': ['单项选择', '完形填空', '阅读理解', '词汇运用', '书面表达'],
                    'high': ['阅读理解', '七选五', '完形填空', '语法填空', '书面表达']
                },
                '物理': {
                    'primary': ['选择题', '判断题', '填空题', '简答题', '探究题'],
                    'middle': ['单项选择题', '多项选择题', '填空题', '实验探究题', '计算题'],
                    'high': ['单项选择题', '多项选择题', '实验题', '计算题', '选考题']
                },
                '化学': {
                    'primary': ['选择题', '判断题', '填空题', '简答题', '探究题'],
                    'middle': ['选择题', '填空题', '推断题', '实验探究题', '计算题'],
                    'high': ['选择题', '填空题', '实验题', '物质结构与性质', '化学计算']
                },
                '科学': {
                    'primary': ['选择题', '判断题', '填空题', '实验探究题', '综合应用题'],
                    'middle': ['选择题', '填空题', '简答题', '实验探究题', '综合题'],
                    'high': ['选择题', '填空题', '实验探究题', '综合应用题', '开放性试题']
                }
            };

        function compressForOCR(file) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); let width = img.width, height = img.height; const maxRes = 1200; 
                        if (width > maxRes) { height = Math.round((height * maxRes) / width); width = maxRes; }
                        canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height); resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                };
            });
        }

            const isTextMode = (config.modelType === 'text'); const sylInfo = getSyllabusString(); 
            let aiPayload = {}; submitBtn.disabled = true; submitBtn.innerHTML = '处理中，请稍候...';

            const kpConstraint = `要求：提取的知识点必须是高度概括的“核心概念名词”，体现所属知识点即可，绝不能是具体的公式、定理内容或长句！例如：只能输出“长方形的面积”，绝不能输出“长方形面积等于长乘宽”。命名符合${sylInfo.fullDesc}术语，禁止超纲。`;

            try {

                        statusEl.innerHTML = `<p class="text-clinic-purple font-bold">扫描提取中 (第 ${i+1}/${files.length} 张)...请稍候...</p>`;
                        const optimizedBase64 = await compressForOCR(files[i]);
                        const { data: { text } } = await Tesseract.recognize(optimizedBase64, 'chi_sim+eng'); combinedText += text + "\n\n";
                    }
                    if (!combinedText.trim()) throw new Error("图片未识别出任何文字。");
                    state.lastExtractedText = combinedText;

                }

                const response = await fetch(endpoint, { method: 'POST', headers: { 'Authorization': `Bearer ${config.key}`, 'Content-Type': 'application/json' }, body: JSON.stringify(aiPayload) });
                if (!response.ok) throw new Error(analyzeApiError(await response.json(), config.model));
                
                const result = await response.json(); let jsonMatch = result.choices[0].message.content.match(/\{[\s\S]*\}/);

        async function generatePrescriptions() {
            const config = getApiConfig();
            const btn = document.getElementById('btn-generate'); const statusBox = document.getElementById('generation-status');
            const sylInfo = getSyllabusString(); 
            
            btn.disabled = true; statusBox.classList.remove('hidden');
            document.getElementById('prescription-render-area').innerHTML = ''; document.getElementById('answer-book-render-area').innerHTML = ''; 
            document.getElementById('export-controls').classList.add('hidden'); 

            let tasks = []; let history = loadHistory();
            state.students.forEach(s => {
                const weakKps = Array.from(document.querySelectorAll(`.kp-check[data-sid="${s.id}"]:checked`)).map(cb => cb.dataset.kp);
                const isMaster = document.querySelector(`.master-check[data-sid="${s.id}"]`).checked;
                
                let maxFailCount = 0;
                weakKps.forEach(kp => { if(history[s.id] && history[s.id][kp] > maxFailCount) maxFailCount = history[s.id][kp]; });

                if (weakKps.length > 0 || isMaster) tasks.push({ student: s, weakKps, isMaster, maxFailCount });
            });

            if (tasks.length === 0) { alert("⚠️ 请至少勾选一名学生！"); btn.disabled = false; statusBox.classList.add('hidden'); return; }

            const variantMode = document.getElementById('pref-variant-mode').checked;
            let typeCountString = "";
            let totalQuestions = 0;

            if (!variantMode) {
                const inputs = document.querySelectorAll('.q-count-input');
                const selected = [];
                inputs.forEach(input => {
                    const count = parseInt(input.value) || 0;
                    if (count > 0) {
                        selected.push(`${count} 道【${input.dataset.type}】`);
                        totalQuestions += count;
                    }
                });
                
                const customNameEl1 = document.getElementById('custom-q-type-name-1');
                const customCountEl1 = document.getElementById('custom-q-type-count-1');
                if (customNameEl1 && customCountEl1) {
                    const customName = customNameEl1.value.trim();
                    const customCount = parseInt(customCountEl1.value) || 0;
                    if (customName && customCount > 0) {
                        selected.push(`${customCount} 道【${customName}】`);
                        totalQuestions += customCount;
                    }
                }

                const customNameEl2 = document.getElementById('custom-q-type-name-2');
                const customCountEl2 = document.getElementById('custom-q-type-count-2');
                if (customNameEl2 && customCountEl2) {
                    const customName = customNameEl2.value.trim();
                    const customCount = parseInt(customCountEl2.value) || 0;
                    if (customName && customCount > 0) {
                        selected.push(`${customCount} 道【${customName}】`);
                        totalQuestions += customCount;
                    }
                }
                
                typeCountString = selected.join('、');
                if (totalQuestions === 0) {
                    alert("⚠️ 请至少在一项题型中设置数量！");
                    btn.disabled = false; statusBox.classList.add('hidden');
                    return;
                }
            } else {
                if (!state.lastExtractedText && state.lastExtractedImages.length === 0) {
                    alert("⚠️ 变式题模式需要先在【第三步：上传作业图片提取知识点】中上传原图并提交 AI！");
                    btn.disabled = false; statusBox.classList.add('hidden');
                    return;
                }
            }

            const wantHints = document.getElementById('pref-q-hints').checked;

            let endpoint = config.url.endsWith('/chat/completions') ? config.url : `${config.url}/chat/completions`;
            let successCount = 0; let failCount = 0; let globalAnswerBookHtml = ""; 

            for (let i = 0; i < tasks.length; i++) {
                const task = tasks[i];
                statusBox.innerHTML = `<span class="text-clinic-cyan font-bold">🧠 AI 正在为 ${task.student.name} 生成... (进度: ${i+1}/${tasks.length})</span>`;
                
                let promptMsg = `你是中小学【${sylInfo.subject}】资深教研员。请为学生【${task.student.name}】出一份专属试卷。\n`;
                promptMsg += `【学情基准】：该生就读于${sylInfo.fullDesc}。出题必须严格符合该阶段大纲。\n`;

                if (variantMode) {
                    promptMsg += `【考察目标】：请根据我提供的原图/原题出变式题（题型跟图片/原题完全一致），并根据学生的以下知识点（或薄弱点）：[${task.isMaster ? '高阶拓展' : task.weakKps.join('、')}] 进行定制。\n`;
                    if (task.maxFailCount > 0) {
                        promptMsg += `⚠️【重要教研反馈】：该生在此前针对这些薄弱点的诊断中，已经反复错了 ${task.maxFailCount} 次！请在变式时变换考察情景或增加思维深度。\n`;
                    }
                } else {
                    if (task.isMaster) {
                        promptMsg += `【考察目标】：该生基础已完全过关，请围绕高阶思维拓展设计以下题目：${typeCountString}。\n`;
                    } else {
                        promptMsg += `【考察目标】：针对该生薄弱点：[${task.weakKps.join('、')}]，设计以下题目：${typeCountString}。\n`;
                        if (task.maxFailCount > 0) {
                            promptMsg += `⚠️【重要教研反馈】：该生在此前针对这些薄弱点的诊断中，已经反复错了 ${task.maxFailCount} 次！请变换考察情景或增加思维深度。\n`;
                        }
                    }
                }

                promptMsg += `\n【🔥🔥 数量与排版强制模板（极其重要）🔥🔥】\n`;
                
                if (variantMode) {
                    promptMsg += `要求1：题目数量和题型必须与上传的原题保持完全一致！禁止在一题中嵌套 (1)(2) 小问！\n`;
                } else {
                    promptMsg += `要求1：必须且只能有 ${totalQuestions} 道完全独立的题目。禁止在一题中嵌套 (1)(2) 小问！\n`;
                }
                
                promptMsg += `要求2：必须使用 XML 标签包裹。在 <题目> 中，每道题后必须留出一行空行。\n`;
                promptMsg += `要求3：请严格模仿以下 Few-Shot 模板的结构输出：\n\n`;
                promptMsg += `### 模板开始 ###\n`;
                promptMsg += `<题目>\n`;
                promptMsg += `1. 这里是第一题的内容...\n\n`;
                promptMsg += `2. 这里是第二题的内容...\n\n`;
                promptMsg += `</题目>\n`;
                promptMsg += `<答案>\n`;
                promptMsg += `1. 【考点】... 【解析】... 【答案】...\n`;
                promptMsg += `2. 【考点】... 【解析】... 【答案】...\n`;
                promptMsg += `</答案>\n`;
                promptMsg += `### 模板结束 ###\n\n开始生成：`;

                let messagesArray = [];
                if (variantMode) {
                    if (config.modelType === 'vision' && state.lastExtractedImages.length > 0) {
                        let contentArray = [{ type: "text", text: promptMsg }];
                        state.lastExtractedImages.forEach(base64 => {
                            contentArray.push({ type: "image_url", image_url: { url: base64 } });
                        });
                        messagesArray = [{ role: "user", content: contentArray }];
                    } else if (state.lastExtractedText) {
                        promptMsg += `\n【参考原题文本】：\n${state.lastExtractedText}\n`;
                        messagesArray = [{ role: "user", content: promptMsg }];
                    } else {
                        messagesArray = [{ role: "user", content: promptMsg }];
                    }
                } else {
                    messagesArray = [{ role: "user", content: promptMsg }];
                }

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST', headers: { 'Authorization': `Bearer ${config.key}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: config.model.toLowerCase(), messages: messagesArray, max_tokens: 3500, temperature: 0.5 })
                    });
                    
                    if (!response.ok) throw new Error(analyzeApiError(await response.json(), config.model));
                    let content = (await response.json()).choices[0].message.content.replace(/```[a-zA-Z]*\n?/gi, '').replace(/```/g, '');
                    
                    let qPart = "⚠️ 题目提取失败。"; let aPart = "⚠️ 答案提取失败。";
                    const qMatch = content.match(/<题目>([\s\S]*?)<\/题目>/); const aMatch = content.match(/<答案>([\s\S]*?)<\/答案>/);
                    if (qMatch && qMatch[1]) qPart = qMatch[1].trim(); if (aMatch && aMatch[1]) aPart = aMatch[1].trim();

                    if (!task.isMaster) recordHistory(task.student.id, task.weakKps);

                    let displayContent = "";
                    if (wantHints) displayContent = `${qPart}\n\n<div class="mt-8 pt-6 border-t-2 border-dashed border-gray-300" contenteditable="false"><h3 class="text-xl font-bold text-clinic-cyan mb-3">【解题锦囊与答案】</h3>\n${aPart}</div>`;
                    else {
                        displayContent = qPart;
                        globalAnswerBookHtml += `<div class="mb-8"><h3 class="text-xl font-bold text-white bg-clinic-purple inline-block px-4 py-1.5 rounded-r-full shadow-md mb-3 -ml-10">学生：${task.student.name}</h3><div class="pl-4 border-l-4 border-purple-200 text-gray-800">${aPart}</div></div>`;
                    }

                    renderSinglePrescriptionHTML(task.student, displayContent, sylInfo.subject);
                    successCount++;
                } catch (error) {
                    renderSinglePrescriptionHTML(task.student, `⚠️ 生成失败：${error.message}`, sylInfo.subject);
                    failCount++;
                }
            }

            if (!wantHints && globalAnswerBookHtml !== "") renderAnswerBook(globalAnswerBookHtml);
            statusBox.innerHTML = `<span class="text-green-500 font-bold">✅ 任务结束！成功 ${successCount} 份，请向下滚动查看并手动微调排版。</span>`;
            btn.disabled = false; document.getElementById('export-controls').classList.remove('hidden');
            
            startAutoSaveDaemon();
        }

        async function createPdfFromElement(el) {
            const pdfWidthMm = 210; 
            const pdfHeightMm = 297; 
            
            const prose = el.querySelector('.prose');
            if(prose) prose.style.boxShadow = 'none';

            // 截图前暂时移除页面上的辅助分页线，保证 PDF 纯净
            const hasGuide = el.classList.contains('a4-page-guide');
            if (hasGuide) el.classList.remove('a4-page-guide');

            const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            
            // 截图后恢复辅助分页线
            if (hasGuide) el.classList.add('a4-page-guide');

            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            
            const pdf = new window.jspdf.jsPDF('p', 'mm', [pdfWidthMm, pdfHeightMm]);
            const imgProps = pdf.getImageProperties(imgData);
            const imgHeightInMm = (imgProps.height * pdfWidthMm) / imgProps.width;
            
            let heightLeft = imgHeightInMm; let position = 0;
            
            pdf.addImage(imgData, 'JPEG', 0, position, pdfWidthMm, imgHeightInMm);
            heightLeft -= pdfHeightMm;

            while (heightLeft > 0) {
                position = heightLeft - imgHeightInMm;
                pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, position, pdfWidthMm, imgHeightInMm);
                heightLeft -= pdfHeightMm;
            }
            return pdf;
        }

        async function fetchSyllabusFromAI() {
            const config = getApiConfig(); 
            if (!config || !config.key || !config.model) return alert("⚠️ 请先配置 API！");
            
            const sylInfo = getSyllabusString(); 
            const loading = document.getElementById('syllabus-loading'); 
            const container = document.getElementById('syllabus-container');
            
            loading.classList.remove('hidden'); 
            container.classList.add('hidden');
            
            let endpoint = config.url.endsWith('/chat/completions') ? config.url : `${config.url}/chat/completions`;
            
            const promptMsg = `你是中小学教研专家。请依据最新课程标准，输出真实的【${sylInfo.fullDesc}】教材完整官方目录。
要求：
1. 必须细化到具体的课文、课题或小节名称，不能只有大单元。
2. 必须且只能输出合法的纯 JSON 格式，不要加 \`\`\`json 标记，不要有任何解释性文字。
3. 注意：务必根据真实学科内容生成，绝对不可照抄下方格式范例的内容！
格式范例：{"chapters": ["第一单元 单元名称", "第1课 课题名称", "第2课 课题名称"]}`;
            
            try {
                const response = await fetch(endpoint, { 
                    method: 'POST', 
                    headers: { 'Authorization': `Bearer ${config.key}`, 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ 
                        model: config.model.toLowerCase(), 
                        messages: [{ role: "user", content: promptMsg }], 
                        temperature: 0.1
                    }) 
                });
                
                if (!response.ok) throw new Error(analyzeApiError(await response.json(), config.model));
                
                let rawContent = (await response.json()).choices[0].message.content;
                
                rawContent = rawContent.replace(/```[a-zA-Z]*\n?/gi, '').replace(/```/g, '').trim();
                
                const match = rawContent.match(/\{[\s\S]*\}/);
                if (!match) throw new Error("AI 未返回合法的 JSON 结构");
                let jsonString = match[0];
                
                jsonString = jsonString.replace(/,\s*([\]}])/g, '$1');
                
                const data = JSON.parse(jsonString);
                
                if (!data.chapters || !Array.isArray(data.chapters)) {
                    throw new Error("JSON 数据中未找到 chapters 数组");
                }
                
                container.innerHTML = '<div class="w-full text-xs text-gray-500 mb-2">💡 点击下方具体目录即可添加至待生成知识点：</div>';
                data.chapters.forEach(chap => {
                    const tag = document.createElement('button'); 
                    tag.className = "text-xs bg-gray-100 dark:bg-gray-700 border dark:border-gray-600 px-3 py-1.5 rounded-full hover:border-clinic-cyan text-left transition-colors"; 
                    tag.innerText = "+ " + chap;
                    tag.onclick = () => { 
                        const inputs = document.querySelectorAll('.kp-input'); 
                        if (inputs.length===1 && !inputs[0].value) inputs[0].value = chap; 
                        else addKpInputToDOM(chap); 
                    };
                    container.appendChild(tag);
                });
                container.classList.remove('hidden');
                
            } catch (error) { 
                console.error("AI 目录解析日志:", error);
                alert(`❌ 获取大纲失败，请重试或手动输入。\n\n详情：${error.message}`); 
            } finally { 
                loading.classList.add('hidden'); 
            }
        }
